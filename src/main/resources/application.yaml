spring:
  application:
    name: hotelBooking
  datasource:
    url: jdbc:postgresql://localhost:5432/hotel_db
    username: hotel_user
    password: hotel_pass
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true